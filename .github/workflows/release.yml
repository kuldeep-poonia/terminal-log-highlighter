name: Build and Release

# Trigger on push of a version tag (e.g., v1.0.0, v2.3.1)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # semantic versioning pattern

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sentinel #from sentienel-poonia to sentienel

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}     #nothing ------ trying to trigger workflow
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: sentinel-Linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: sentinel-Linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: sentinel-Darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: sentinel-Darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sentinel-Windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Inject version from tag
        shell: bash
        run: |
          # Extract version from git tag (remove leading 'v')
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Set environment variable for compile-time embedding
          echo "SENTINEL_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --config "env.SENTINEL_VERSION=\"${SENTINEL_VERSION}\""

      - name: Prepare asset
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe"
          else
            BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          fi
          cp "$BIN" "${{ matrix.asset_name }}"

      - name: Upload artifact to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
          overwrite: true

  # Optional: create a checksum file for all assets
  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all assets
        uses: actions/download-artifact@v3
        with:
          path: assets

      - name: Generate checksums
        run: |
          cd assets || exit 1
          find . -type f -exec sha256sum {} \; > sha256sums.txt

      - name: Upload checksums
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: assets/sha256sums.txt
          asset_name: sha256sums.txt
          tag: ${{ github.ref }}
          overwrite: true