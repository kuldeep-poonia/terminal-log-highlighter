name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (musl – fully static binary) ─────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: sentinel-Linux-x86_64

          # ── Linux arm64 (musl – fully static binary) ──────────────────────
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: sentinel-Linux-arm64
            cross: true

          # ── macOS Intel ───────────────────────────────────────────────────
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: sentinel-Darwin-x86_64

          # ── macOS Apple Silicon ───────────────────────────────────────────
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: sentinel-Darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install cross-compilation toolchain for Linux arm64
      - name: Install cross (arm64 only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # musl linker for x86_64 Linux static binary
      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      # Build
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # Rename binary to the artifact name expected by install.sh
      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/sentinel ${{ matrix.artifact }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}