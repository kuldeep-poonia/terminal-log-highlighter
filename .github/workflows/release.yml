name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sentinel   

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: sentinel-Linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: sentinel-Linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: sentinel-Darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: sentinel-Darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sentinel-Windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe"
          else
            BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          fi

          echo "Looking for binary at $BIN"
          ls -l "$BIN"   # debug: will fail if missing

          cp "$BIN" "${{ matrix.asset_name }}"

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
          overwrite: true

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download assets
        uses: actions/download-artifact@v3   # all uploaded artifacts from previous jobs
        with:
          path: assets

      - name: Generate checksums
        run: |
          cd assets
          find . -type f -exec sha256sum {} \; > ../sha256sums.txt

      - name: Upload checksums
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: sha256sums.txt
          asset_name: sha256sums.txt
          tag: ${{ github.ref }}
          overwrite: true